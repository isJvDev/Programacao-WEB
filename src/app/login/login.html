<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            
            <div class="text-center mb-4">
                <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-fill" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="fw-bold mt-3">Acessar Conta</h2>
                <p class="text-muted small">Entre para ver seus pedidos</p>
            </div>

            <form (ngSubmit)="login()">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingEmail" name="email" 
                           placeholder="nome@exemplo.com" [(ngModel)]="email" required>
                    <label for="floatingEmail">E-mail</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="floatingPassword" name="senha" 
                           placeholder="Senha" [(ngModel)]="senha" required>
                    <label for="floatingPassword">Senha</label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark btn-lg fw-bold shadow-sm py-3" style="border-radius: 10px;">
                        Entrar na Loja
                    </button>
                </div>

               
            </form>
            
        </div>
    </div>
</div>
