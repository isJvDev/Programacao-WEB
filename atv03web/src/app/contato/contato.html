<h3>Contato</h3>
<b>{{mensagem}}</b>
<br><br>

<p>Preencha o formulário abaixo para entrar em contato conosco:</p>

<form (ngSubmit)="enviar()">

nome:<input type="text" name="nome" [(ngModel)]="nome" placeholder="digite seu nome completo"><br>

email:<input type="text" name="email" [(ngModel)]="email" placeholder="digite seu email"><br>

telefone:<input type="text" name="telefone" [(ngModel)]="telefone" placeholder="digite seu telefone"><br>

assunto:<select name="titulo" [(ngModel)]="titulo">
    <option>Problemas com produtos</option>
    <option>Problemas com pedidos</option>
    <option>Problemas com cadastros</option>
    <option value="sugestao">Sugestão</option>
</select><br>

mensagem:<br>
<textarea rows="5" cols="80" name="texto" [(ngModel)]="texto"></textarea><br>

<input type="checkbox" name="copia" [(ngModel)]="copia">deseja receber uma cópia do email<br>

<button type="submit">Enviar</button>

</form>
