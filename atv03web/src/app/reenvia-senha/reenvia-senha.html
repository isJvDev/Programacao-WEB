<h2>Esqueceu sua senha?</h2>
<p>Digite seu e-mail abaixo para receber as instruções de recuperação.</p>

<b [style.color]="mensagem.includes('enviado') ? 'green' : 'red'">
  {{mensagem}}
</b>
<br><br>

<form (ngSubmit)="recuperar()">
  <input 
    type="email" 
    name="email" 
    placeholder="Seu e-mail cadastrado" 
    [(ngModel)]="email" 
    required
  >
  <br><br>
  
  <button type="submit">Enviar link de recuperação</button>
</form>

<br>
<a routerLink="/login">Voltar para o Login</a>
