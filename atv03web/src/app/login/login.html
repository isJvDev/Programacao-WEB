<h2>Faça Login aqui!</h2>

<form (ngSubmit)="login()">

Digite o email:<input type="email" name="email" placeholder="Email" [(ngModel)]="email">
<br>
Digite a senha:<input type="password" name="senha" placeholder="Senha" [(ngModel)]="senha">
<br>
<button type="submit">Entrar</button>

</form>
