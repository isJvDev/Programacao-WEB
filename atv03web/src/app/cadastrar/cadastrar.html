<h2>Torne-se nosso cliente e cadastre-se aqui!</h2>

<form (ngSubmit)="salvar()">

<input type="text" name="nome" placeholder="Nome" [(ngModel)]="cliente.nome">
<br>
<input type="email" name="email" placeholder="Email" [(ngModel)]="cliente.email">
<br>
<input type="password" name="senha" placeholder="Senha" [(ngModel)]="cliente.senha">
<br>
<button type="submit">Cadastrar</button>

</form>
