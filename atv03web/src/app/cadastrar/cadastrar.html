<h2>Torne-se nosso cliente e cadastre-se aqui!<h2>
<input type="text" placeholder="Nome" [(ngModel)]="cliente.nome">
<br>
<input type="email" placeholder="Email" [(ngModel)]="cliente.email">
<br>
<input type="password" placeholder="Senha" [(ngModel)]="cliente.senha">
<br>
<button (click)="salvar()">Cadastrar</button>
