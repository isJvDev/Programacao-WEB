<div class="container mt-4">
    <div class="card shadow-sm border-0" style="border-radius: 15px;">
        <div class="card-body p-4 p-md-5">
            <h3 class="fw-bold mb-3">Contato</h3>
            
            <div class="alert alert-success" *ngIf="mensagem.length > 0">
                {{mensagem}}
            </div>

            <p class="text-muted mb-4">Preencha o formulário abaixo para entrar em contato conosco:</p>

            <form (ngSubmit)="enviar()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Nome:</label>
                        <input type="text" name="nome" class="form-control" [(ngModel)]="nome" placeholder="Digite seu nome completo">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">E-mail:</label>
                        <input type="email" name="email" class="form-control" [(ngModel)]="email" placeholder="nome@exemplo.com">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Telefone:</label>
                        <input type="text" name="telefone" class="form-control" [(ngModel)]="telefone" placeholder="(11) 99999-9999">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Assunto:</label>
                        <select name="titulo" class="form-select" [(ngModel)]="titulo">
                            <option value="" disabled selected>Selecione um assunto</option>
                            <option>Problemas com produtos</option>
                            <option>Problemas com pedidos</option>
                            <option>Problemas com cadastros</option>
                            <option value="sugestao">Sugestão</option>
                        </select>
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label fw-bold">Mensagem:</label>
                        <textarea class="form-control" rows="5" name="texto" [(ngModel)]="texto" placeholder="Como podemos ajudar?"></textarea>
                    </div>

                    <div class="col-12 mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="copia" id="checkCopia" [(ngModel)]="copia">
                            <label class="form-check-label text-muted" for="checkCopia">
                                Deseja receber uma cópia do e-mail?
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
                            <i class="bi bi-send me-2"></i>Enviar Mensagem
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
