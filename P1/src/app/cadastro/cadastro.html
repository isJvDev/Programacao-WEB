<div class="container mt-5">
  <div class="row">
    
    <div class="col-md-6 border-end">
      <div class="p-4">
        <h2 class="fw-bold mb-4">Já tenho cadastro</h2>
        
        <div class="mb-3">
          <label class="form-label">E-mail:</label>
          <input type="email" class="form-control" [(ngModel)]="emailLogin" placeholder="seu@email.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Senha:</label>
          <input type="password" class="form-control" [(ngModel)]="senhaLogin" placeholder="******">
        </div>

        <div class="d-grid gap-2">
          <button class="btn btn-primary btn-lg" (click)="login()">Entrar</button>
        </div>

        <div class="mt-3 text-center">
  <p class="text-muted small mb-1">Problemas para acessar?</p>
  <a routerLink="/recupera" class="btn btn-sm btn-outline-secondary border-0 text-decoration-underline">
    Recuperar acesso à conta
  </a>
</div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="p-4 h-100 d-flex flex-column justify-content-center align-items-center text-center">
        <h2 class="fw-bold mb-3">Não tenho cadastro</h2>
        <p class="text-muted mb-4">Crie sua conta para acompanhar seus pedidos e comprar mais rápido.</p>
        
        <button class="btn btn-outline-dark btn-lg px-5" (click)="exibirFormulario = true" *ngIf="!exibirFormulario">
          Clique aqui para cadastrar
        </button>

        <div class="w-100 text-start mt-3" *ngIf="exibirFormulario">
          <div class="alert alert-success" *ngIf="mensagem.length > 0">{{mensagem}}</div>
          
          <label class="form-label">Nome:</label>
          <input type="text" class="form-control mb-2" [(ngModel)]="obj.nome">

          <label class="form-label">E-mail:</label>
          <input type="email" class="form-control mb-2" [(ngModel)]="obj.email">

          <label class="form-label">Telefone:</label>
          <input type="text" class="form-control mb-2" [(ngModel)]="obj.telefone">

          <label class="form-label">Senha:</label>
          <input type="password" class="form-control mb-2" [(ngModel)]="obj.senha">

          <label class="form-label">Endereço:</label>
          <textarea class="form-control mb-3" [(ngModel)]="obj.logradouro"></textarea>

          <div class="d-flex gap-2">
            <button class="btn btn-success flex-grow-1" (click)="cadastrar()">Confirmar Cadastro</button>
            <button class="btn btn-light" (click)="exibirFormulario = false">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
