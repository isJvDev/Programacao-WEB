<div class="row">
    <div class="col-12 display-4">{{obj.nome}}</div>
    <div class="col-sm-12 col-md-6">
        <img src="produto_{{obj.codigo}}.png" class="card-img-top" 
        width="150px"><br>
    </div>
    <div class="col-sm-12 col-md-6">
        {{obj.descritivo}}
        
        @if(obj.promo<obj.valor){
            de: <s>R$ {{obj.valor}}</s> <br>
            por: R$ {{obj.promo}}
        } @else {
            R$ {{obj.valor}}
        }<br>
        @if(obj.quantidade > 0){
            <button class="btn btn-outline-success" (click)="adicionarItemCesta(obj);">Comprar</button>
        } @else {
            <b>Sem Estoque</b>  
        }

    </div>
</div>
